<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAU Ride - Driver App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #cbd5e1; } 
        .map-bg { background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&w=800&auto=format&fit=crop'); background-size: cover; background-position: center; }
        ::-webkit-scrollbar { display: none; }
        .view { display: none; height: 100%; flex-direction: column; } .view.active { display: flex; }
        @keyframes drive { 0% { top: 10%; left: 10%; } 100% { top: 80%; left: 20%; } }
        .car-marker { animation: drive 10s infinite alternate ease-in-out; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <div class="w-full max-w-[400px] h-screen sm:h-[850px] bg-gray-900 sm:rounded-[3rem] sm:border-[10px] sm:border-gray-900 overflow-hidden relative shadow-2xl flex flex-col">
        
        <div id="view-home" class="view active relative pb-24 h-full">
            <div class="absolute inset-0 map-bg z-0" id="mapOverlay"><div class="absolute inset-0 bg-gray-900/70 backdrop-blur-sm" id="mapBlur"></div></div>

            <div class="relative z-10 flex justify-between items-center p-6 pt-10 w-full">
                <div class="bg-gray-800/80 backdrop-blur-md px-4 py-2 rounded-full shadow-lg flex items-center gap-2 border border-gray-700">
                    <div id="statusDot" class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="driverStatusText" class="text-xs font-bold text-white tracking-wide uppercase">Online</span>
                </div>
                <div class="w-10 h-10 rounded-full border-2 border-gray-700 overflow-hidden bg-gray-800 flex items-center justify-center text-white font-bold" id="homeAvatar">DR</div>
            </div>

            <!-- RADAR -->
            <div id="radarView" class="absolute inset-0 flex flex-col items-center justify-center z-10 pointer-events-none">
                <div class="w-32 h-32 bg-blue-500/20 rounded-full flex items-center justify-center animate-ping"></div>
                <div class="absolute w-16 h-16 bg-blue-600 rounded-full border-4 border-gray-900 shadow-2xl flex items-center justify-center"><svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                <p id="radarText" class="absolute mt-40 text-blue-200 font-bold tracking-widest uppercase text-xs">Waiting for requests...</p>
            </div>

            <!-- LIVE MAP CAR (Hidden by default) -->
            <div id="liveCarMarker" class="hidden absolute car-marker bg-white p-2 rounded-full shadow-xl border-2 border-blue-600 z-10 items-center gap-2">
                <div class="w-3 h-3 bg-blue-600 rounded-full animate-ping absolute"></div>
                <svg class="w-5 h-5 text-blue-600 relative z-10" fill="currentColor" viewBox="0 0 20 20"><path d="M8 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM15 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z" /><path d="M3 4a1 1 0 00-1 1v10a1 1 0 001 1h1.05a2.5 2.5 0 014.9 0H10a1 1 0 001-1V5a1 1 0 00-1-1H3zM14 7c-1.276 0-2.498.418-3.486 1.157A2.002 2.002 0 0010 10v4a1 1 0 001 1h.05a2.5 2.5 0 014.9 0H17a1 1 0 001-1v-5h-1c-.552 0-1-.448-1-1V7h-2z" /></svg>
            </div>

            <!-- BOTTOM SHEET (Incoming/Active Ride) -->
            <div class="absolute bottom-0 w-full bg-white rounded-t-[2.5rem] shadow-[0_-20px_40px_-15px_rgba(0,0,0,0.3)] z-20 transition-transform duration-300 min-h-[100px] flex flex-col pb-20" id="rideSheet">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mt-4 mb-4 shrink-0"></div>
                <div class="px-6 flex-grow flex flex-col" id="rideContainer">
                    <div class="flex-grow flex flex-col items-center justify-center text-gray-400 py-6"><p class="font-bold text-sm">Waiting for specific requests...</p></div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 w-full bg-gray-900 border-t border-gray-800 px-6 py-4 flex justify-between items-center z-30 pb-6 sm:pb-4 rounded-b-[2.5rem]">
            <a href="index.html" class="flex flex-col items-center text-red-500 hover:text-red-400 cursor-pointer w-full text-center"><svg class="w-6 h-6 mb-1 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg><span class="text-[10px] font-bold">Logout</span></a>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let driverData = JSON.parse(localStorage.getItem('campusRideUser')) || { name: "Driver", id: "D1", vehicleModel: "Car", plateNumber: "ABC" };
        
        // Emits driver presence to server so students can see them!
        socket.emit('driverOnline', driverData);

        document.getElementById('homeAvatar').innerText = driverData.name.charAt(0);

        socket.on('systemUpdate', (data) => {
            // NEW: Instantly log out if Admin deleted this account
            if(!data.users) return; // Wait for full data
            const myDbProfile = data.users.find(u => u.id === driverData.id);
            if(!myDbProfile) {
                alert("Your account has been deleted by the Administrator.");
                localStorage.removeItem('campusRideUser');
                window.location.href = 'index.html';
                return;
            }

            const statusDot = document.getElementById('statusDot');
            const driverStatusText = document.getElementById('driverStatusText');
            const radarText = document.getElementById('radarText');

            // NEW: Check Approval Status
            if(!myDbProfile.approved) {
                driverStatusText.innerText = "PENDING";
                driverStatusText.classList.replace('text-white', 'text-orange-400');
                statusDot.classList.replace('bg-green-500', 'bg-orange-500');
                radarText.innerHTML = `<span class="text-red-400 text-center">Account not approved yet.<br>Please wait for Admin.</span>`;
                return; // Stop here, don't show requests until approved
            } else {
                driverStatusText.innerText = "ONLINE";
                driverStatusText.classList.replace('text-orange-400', 'text-white');
                statusDot.classList.replace('bg-orange-500', 'bg-green-500');
                radarText.innerText = "Waiting for requests...";
            }

            const rideContainer = document.getElementById('rideContainer');
            const radarView = document.getElementById('radarView');
            const mapBlur = document.getElementById('mapBlur');
            const carMarker = document.getElementById('liveCarMarker');
            
            const ride = data.ride;

            // Only show the request if the student specifically selected THIS driver!
            if (ride && ride.driverId === driverData.id && ride.status === 'pending') {
                radarView.classList.add('hidden'); mapBlur.classList.remove('hidden'); carMarker.classList.add('hidden');
                
                // Show Scheduled Time if not "Now"
                const timeBadge = ride.scheduledTime !== "Now" ? `<span class="bg-purple-100 text-purple-600 px-2 py-1 rounded-md text-[10px] font-bold">SCHEDULED: ${new Date(ride.scheduledTime).toLocaleString()}</span>` : `<span class="bg-blue-50 text-blue-600 px-2 py-1 rounded-md text-[10px] font-bold">RIDE NOW</span>`;

                rideContainer.innerHTML = `
                    <div class="flex flex-col mb-4">
                        <div class="flex gap-2 mb-2">${timeBadge}</div>
                        <h2 class="text-2xl font-extrabold text-gray-900">${ride.passenger}</h2>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-3xl border border-gray-100 mb-4">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Pickup: <span class="text-sm font-bold text-gray-800">${ride.pickup}</span></p>
                        <hr class="my-2 border-gray-200">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Drop-off: <span class="text-sm font-bold text-gray-800">${ride.dropoff}</span></p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="declineRide()" class="w-1/3 bg-red-50 text-red-600 py-4 rounded-2xl font-bold transition-all">Decline</button>
                        <button onclick="acceptRide()" class="w-2/3 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-600/30 active:scale-95 transition-all">Accept Ride</button>
                    </div>
                `;
            } else if (ride && ride.driverId === driverData.id && ride.status === 'accepted') {
                // DRIVING MODE - LIVE MAP!
                radarView.classList.add('hidden'); mapBlur.classList.add('hidden'); carMarker.classList.remove('hidden'); carMarker.classList.add('flex');
                rideContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center pt-2">
                        <h2 class="text-2xl font-extrabold text-gray-900">Live Map Tracking</h2>
                        <p class="text-gray-500 text-sm font-medium mt-1 mb-6 text-center">Heading to: <span class="font-bold text-gray-800">${ride.pickup}</span></p>
                        <button onclick="completeRide()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">Complete Trip</button>
                    </div>
                `;
            } else {
                radarView.classList.remove('hidden'); mapBlur.classList.remove('hidden'); carMarker.classList.add('hidden');
                rideContainer.innerHTML = `<div class="flex-grow flex flex-col items-center justify-center text-gray-400 py-6"><p class="font-bold text-sm">System Online. Waiting for requests.</p></div>`;
            }
        });

        function acceptRide() { socket.emit('acceptRide'); }
        function declineRide() { socket.emit('declineRide'); }
        function completeRide() { socket.emit('completeRide'); }
    </script>
</body>
</html>
