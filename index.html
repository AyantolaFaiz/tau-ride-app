<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAU RIDE - App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #cbd5e1; } ::-webkit-scrollbar { display: none; } </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <div class="w-full max-w-[400px] h-screen sm:h-[850px] bg-white sm:rounded-[3rem] sm:border-[10px] sm:border-gray-900 overflow-hidden relative shadow-2xl flex flex-col">
        
        <header class="absolute top-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-md">T</div>
                <div><h1 class="font-bold text-sm leading-tight">TAU RIDE</h1><p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Campus Transport</p></div>
            </div>
        </header>

        <div class="flex-grow overflow-y-auto pb-6 relative z-0">
            <div class="relative h-[65vh] flex items-end pb-12">
                <img src="tau-gate.jpg" alt="TAU Gate" class="absolute inset-0 w-full h-full object-cover" />
                <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/60 to-transparent"></div>
                <div class="relative z-10 px-6 w-full">
                    <h1 class="text-4xl font-extrabold leading-tight text-white mb-3">Your Ride,<br/>Your Campus.</h1>
                    <button onclick="openAuthModal('signup')" class="w-full py-4 rounded-2xl bg-blue-600 text-white font-bold text-[15px] shadow-lg active:scale-95 transition-all">Sign Up Now</button>
                    <button onclick="openAuthModal('login')" class="w-full py-4 mt-3 rounded-2xl bg-white/10 backdrop-blur border border-white/20 text-white font-bold text-[15px] active:scale-95 transition-all">Login</button>
                </div>
            </div>
            
            <div class="text-center py-6">
                <!-- SPECIAL ADMIN LOGIN TOGGLE -->
                <button onclick="openAdminLogin()" class="text-xs font-bold text-gray-400 hover:text-gray-800 transition">Secret Admin Login</button>
            </div>
        </div>

        <!-- AUTH BOTTOM SHEET -->
        <div id="authModal" class="absolute inset-0 z-50 bg-gray-900/60 backdrop-blur-sm hidden flex-col justify-end">
            <div id="authSheet" class="bg-white w-full rounded-t-[2.5rem] shadow-2xl transform translate-y-full transition-transform duration-300 flex flex-col max-h-[90%]">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mt-4 mb-2 shrink-0"></div>
                <button onclick="closeAuthModal()" class="absolute top-4 right-6 p-2 bg-gray-100 rounded-full text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                
                <div class="px-8 pb-4 shrink-0">
                    <h2 class="text-2xl font-extrabold text-gray-900" id="authTitle">Welcome</h2>
                    <p class="text-gray-500 text-sm mt-1 font-medium" id="authSubtitle">Join TAU Ride</p>
                </div>

                <div class="px-8 pb-8 overflow-y-auto">
                    <div id="tabsContainer" class="flex bg-gray-100 p-1 rounded-xl mb-6 shrink-0">
                        <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-2.5 text-sm font-bold rounded-lg text-gray-500 transition-all">Login</button>
                        <button id="signupTab" onclick="switchTab('signup')" class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-white shadow-sm text-blue-600 transition-all">Sign Up</button>
                    </div>

                    <form id="authForm" class="space-y-4">
                        <div id="nameField">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Full Name</label>
                            <input type="text" id="fullName" placeholder="e.g. Ayantola Faiz" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 outline-none font-bold text-sm text-gray-800">
                        </div>
                        
                        <div>
                            <label id="userIdLabel" class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">TAU Email Address</label>
                            <input type="text" id="userId" placeholder="student@tau.edu.ng" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 outline-none font-bold text-sm text-gray-800">
                        </div>
                        
                        <div id="roleField">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">I am a...</label>
                            <select id="role" onchange="checkDriverFields()" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 outline-none font-bold text-sm text-gray-800 appearance-none">
                                <option value="student">Student (Rider)</option>
                                <option value="driver">Campus Driver</option>
                            </select>
                        </div>
                        
                        <div id="driverFields" class="hidden space-y-4 bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                            <div><label class="block text-[10px] font-bold text-blue-600 uppercase mb-1">Vehicle Model</label><input type="text" id="vehicleModel" placeholder="e.g. Toyota Corolla" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold text-sm text-gray-800"></div>
                            <div><label class="block text-[10px] font-bold text-blue-600 uppercase mb-1">Plate Number</label><input type="text" id="plateNumber" placeholder="TAU-123" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 outline-none font-bold text-sm text-gray-800 uppercase"></div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Password</label>
                            <input type="password" id="password" placeholder="••••••••" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 outline-none font-bold text-sm text-gray-800">
                        </div>

                        <button type="button" onclick="submitForm()" id="actionBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-[15px] shadow-lg active:scale-95 transition-all mt-2">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentMode = 'signup'; 

        function openAuthModal(type) {
            document.getElementById('authModal').classList.remove('hidden'); document.getElementById('authModal').classList.add('flex');
            setTimeout(() => document.getElementById('authSheet').classList.remove('translate-y-full'), 10);
            switchTab(type);
        }
        function closeAuthModal() {
            document.getElementById('authSheet').classList.add('translate-y-full');
            setTimeout(() => { document.getElementById('authModal').classList.add('hidden'); document.getElementById('authModal').classList.remove('flex'); }, 300);
        }

        function openAdminLogin() { openAuthModal('admin'); }

        function switchTab(type) {
            currentMode = type;
            const loginTab = document.getElementById('loginTab'); const signupTab = document.getElementById('signupTab');
            const userIdInput = document.getElementById('userId');
            const userIdLabel = document.getElementById('userIdLabel');

            if(type === 'admin') {
                document.getElementById('tabsContainer').classList.add('hidden');
                document.getElementById('nameField').classList.add('hidden');
                document.getElementById('roleField').classList.add('hidden');
                document.getElementById('driverFields').classList.add('hidden');
                
                userIdLabel.innerText = "Admin ID";
                userIdInput.placeholder = "e.g. admin";
                
                document.getElementById('actionBtn').innerText = "Login as Admin";
                document.getElementById('authTitle').innerText = "Admin Portal";
                document.getElementById('authSubtitle').innerText = "Secret Access";
            } else if(type === 'signup') {
                document.getElementById('tabsContainer').classList.remove('hidden');
                signupTab.className = "flex-1 py-2.5 text-sm font-bold rounded-lg bg-white shadow-sm text-blue-600 transition-all";
                loginTab.className = "flex-1 py-2.5 text-sm font-bold rounded-lg text-gray-500 transition-all";
                
                document.getElementById('nameField').classList.remove('hidden');
                document.getElementById('roleField').classList.remove('hidden');
                
                userIdLabel.innerText = "TAU Email Address";
                userIdInput.placeholder = "student@tau.edu.ng";
                
                document.getElementById('actionBtn').innerText = "Create Account";
                document.getElementById('authTitle').innerText = "Join TAU Ride";
                document.getElementById('authSubtitle').innerText = "Account required to proceed";
                checkDriverFields();
            } else if (type === 'login') {
                document.getElementById('tabsContainer').classList.remove('hidden');
                loginTab.className = "flex-1 py-2.5 text-sm font-bold rounded-lg bg-white shadow-sm text-blue-600 transition-all";
                signupTab.className = "flex-1 py-2.5 text-sm font-bold rounded-lg text-gray-500 transition-all";
                
                document.getElementById('nameField').classList.add('hidden');
                document.getElementById('roleField').classList.remove('hidden');
                document.getElementById('driverFields').classList.add('hidden');
                
                userIdLabel.innerText = "TAU Email Address";
                userIdInput.placeholder = "student@tau.edu.ng";

                document.getElementById('actionBtn').innerText = "Login";
                document.getElementById('authTitle').innerText = "Welcome Back";
                document.getElementById('authSubtitle').innerText = "Login to your account";
            }
        }

        function checkDriverFields() {
            if(document.getElementById('role').value === 'driver' && currentMode === 'signup') {
                document.getElementById('driverFields').classList.remove('hidden');
            } else {
                document.getElementById('driverFields').classList.add('hidden');
            }
        }

        function submitForm() {
            const role = currentMode === 'admin' ? 'admin' : document.getElementById('role').value;
            const id = document.getElementById('userId').value.trim();
            const pass = document.getElementById('password').value;
            const name = document.getElementById('fullName').value;
            const model = document.getElementById('vehicleModel').value;
            const plate = document.getElementById('plateNumber').value;

            // 1. Basic Field Check (Using ALERTS so they are impossible to miss on mobile)
            if(!id || !pass || (currentMode === 'signup' && !name)) {
                return alert("ERROR: Please fill all required fields.");
            }

            // 2. TAU Email Check
            if (currentMode !== 'admin' && !id.toLowerCase().endsWith('@tau.edu.ng')) {
                return alert("ERROR: You must use a valid @tau.edu.ng email address to register or login.");
            }

            if(currentMode === 'signup') {
                if(role === 'driver' && (!model || !plate)) {
                    return alert("ERROR: Drivers must provide their Vehicle Model and Plate Number.");
                }
                
                socket.emit('registerUser', { id: id, password: pass, name: name, role: role, vehicleModel: model, plateNumber: plate }, (res) => {
                    if(res.success) {
                        localStorage.setItem('campusRideUser', JSON.stringify(res.user));
                        window.location.href = role + '.html'; // Instantly redirect
                    } else {
                        alert("ERROR: " + res.message);
                    }
                });
            } else {
                socket.emit('loginUser', { id: id, password: pass, role: role }, (res) => {
                    if(res.success) {
                        localStorage.setItem('campusRideUser', JSON.stringify(res.user));
                        window.location.href = role + '.html';
                    } else {
                        alert("ERROR: " + res.message);
                    }
                });
            }
        }
    </script>
</body>
</html>
